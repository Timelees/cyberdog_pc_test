mutil_odom_shared:
  ros__parameters:
    status_period_sec: 5.0

    robot_namespaces:
      - cyberdog_1
      - cyberdog_2

    # 关闭 tag_align_enabled 时，退回到每台机器自己的首帧 odom_slam 原点。
    reference_namespace_index: 0

    odom_slam_enabled: true
    odom_slam_input_topic: /odom_slam
    odom_slam_output_topic: /odom_shared

    align_enabled: true
    shared_odom_frame_id: shared_odom
    base_frame_name: base_link

    # 使用 apriltag_ros 发布的 camera optical -> base(tag) TF，
    # 将 /odom_slam 的 VIO/map 位姿转换到 tag(base) 全局坐标系。
    tag_align_enabled: true
    tag_frame_id: base
    tag_optical_frame_id: camera_infra1_optical_frame
    tag_tf_topic: /tf
    # 只用首次可见 tag 标定 VIO/map -> tag(base)，避免 tag 噪声不断改写全局外参。
    tag_align_recalibrate_on_tag_update: false
    # 墙面 AprilTag：X_global=-Z_tag, Y_global=X_tag, Z_global=-Y_tag。
    tag_global_to_tag_x: 0.0
    tag_global_to_tag_y: 0.0
    tag_global_to_tag_z: 0.0
    tag_global_to_tag_roll: -1.5707963267948966
    tag_global_to_tag_pitch: 0.0
    tag_global_to_tag_yaw: 1.5707963267948966
    camera_static_tf_x: 0.26932
    camera_static_tf_y: 0.0
    camera_static_tf_z: 0.11543
    camera_static_tf_roll: 0.0
    camera_static_tf_pitch: 0.19
    camera_static_tf_yaw: 0.0

    publish_tf: true
    publish_odom: true
